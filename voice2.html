<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>院内・改善事例｜大阪 自律神経専門整体院 gene</title>
<meta name="description" content="大阪 自律神経専門整体院 geneの院内写真・改善事例ページ">

<link rel="stylesheet" href="assets/style.css">

<style>
.voice-container{
  max-width: 1100px;
  margin: 120px auto 80px;
  padding: 0 20px;
}

.voice-title{
  text-align: center;
  color: #d9c17e;
  font-size: 28px;
  margin-bottom: 50px;
}

.case-grid{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.case-card{
  border: 1px solid rgba(217,193,126,.22);
  border-radius: 20px;
  overflow: hidden;
  text-decoration: none;
  color: #fff;
  background: rgba(0,0,0,.25);
  transition: transform .3s ease, box-shadow .3s ease;
}

.case-card:hover{
  transform: translateY(-5px);
  box-shadow: 0 10px 30px rgba(0,0,0,.4);
}

.case-card img{
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}

.case-content{
  padding: 20px;
}

.case-content h3{
  color: #d9c17e;
  margin-bottom: 10px;
}

.case-content p{
  font-size: 14px;
  line-height: 1.8;
  color: rgba(255,255,255,.85);
}

@media (max-width: 900px){
  .case-grid{
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="voice-container">

  <h1 class="voice-title">院内・改善事例</h1>

  <div class="case-grid">

    <a href="case1.html" class="case-card">
      <img src="assets/img/case1-thumb.webp" alt="症例1 ビフォーアフター">
      <div class="case-content">
        <h3>症例1</h3>
        <p>
        顔・首・体・足首の変化の経過写真です。<br>
        初回・3か月・6か月の変化を掲載しています。
        </p>
      </div>
    </a>

    <a href="case2.html" class="case-card">
      <img src="assets/img/case2-thumb.webp" alt="症例2 ビフォーアフター">
      <div class="case-content">
        <h3>症例2</h3>
        <p>
        前腕・体・脚・足首の変化の経過写真です。<br>
        初回・3か月・6か月の変化を掲載しています。
        </p>
      </div>
    </a>

    <a href="case3.html" class="case-card">
      <img src="assets/img/case3-thumb.webp" alt="症例3 ビフォーアフター">
      <div class="case-content">
        <h3>症例3</h3>
        <p>
        前腕・足首の経過写真です。<br>
        初回・3か月の変化を掲載しています。
        </p>
      </div>
    </a>

  </div>

</div>

<footer>
  大阪 自律神経専門整体院 gene<br>
  © gene. All Rights Reserved.
</footer>

</body>
</html>
